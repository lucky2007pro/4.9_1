<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>O'chirishni tasdiqlash | TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .delete-card { border-radius: 20px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .warning-icon { font-size: 4rem; color: #dc3545; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="card delete-card p-5 text-center bg-white">
        <div class="warning-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>

        <h3 class="fw-bold text-dark">Ma'lumotni o'chirish</h3>
        <p class="text-muted">
            Siz haqiqatdan ham <strong>{{ item.brand }} {{ item.model }}</strong> ma'lumotlarini bazadan butunlay o'chirib tashlamoqchimisiz?
        </p>

        <div class="alert alert-warning small py-2">
            <i class="fas fa-info-circle me-1"></i> Bu amalni ortga qaytarib bo'lmaydi!
        </div>

        <form method="POST" class="mt-4">
            {% csrf_token %}
            <div class="d-grid gap-2 d-md-flex justify-content-center">
                <a href="/" class="btn btn-light px-4 border">Yo'q, qolsin</a>
                <button type="submit" class="btn btn-danger px-4 fw-bold">Ha, o'chirilsin</button>
            </div>
        </form>
    </div>

</body>
</html>
