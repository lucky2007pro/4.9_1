<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Yangi Noutbuk Qo'shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h3 class="m-0"><i class="fas fa-laptop me-2"></i>Noutbuk Ma'lumotlarini Kiriting</h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Brend</label>
                                    <input type="text" name="brand" class="form-control" placeholder="Apple, ASUS, Lenovo" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Model</label>
                                    <input type="text" name="model" class="form-control" placeholder="MacBook, Zenbook" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Yil</label>
                                    <input type="number" name="year" class="form-control" value="2024" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Narxi ($)</label>
                                    <input type="number" name="price" class="form-control" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Protsessor (CPU)</label>
                                    <input type="text" name="cpu" class="form-control" placeholder="M2 Chip yoki Ryzen 7" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Videokarta</label>
                                    <input type="text" name="videocard" class="form-control" placeholder="Integral yoki GTX">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">RAM (GB)</label>
                                    <input type="number" name="ram" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Disk (GB)</label>
                                    <input type="number" name="disk" class="form-control" required>
                                </div>
                            </div>
                            <a href="{% url 'delete_laptop' l.id %}" class="btn btn-sm btn-outline-danger">
                                <i class="fas fa-trash-alt"></i> O'chirish
                            </a>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Saqlash</button>
                                <a href="/" class="btn btn-outline-secondary w-100 mt-2">Orqaga</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
