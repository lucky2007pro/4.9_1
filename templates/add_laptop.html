<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noutbuk Qo'shish | TechStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #080b10;
            --bg2: #0d1117;
            --bg3: #131920;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.13);
            --accent: #10b981;
            --accent2: #34d399;
            --accent-glow: rgba(16,185,129,0.16);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #475569;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed; bottom: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 65%);
            pointer-events: none; z-index: 0;
        }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(8,11,16,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center;
        }
        .nav-inner {
            max-width: 860px; width: 100%; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
            color: var(--text); letter-spacing: -0.03em;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: #3b82f6;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; box-shadow: 0 0 18px rgba(59,130,246,0.25);
        }
        .back-link {
            display: flex; align-items: center; gap: 6px;
            text-decoration: none; font-size: 0.85rem;
            color: var(--text2); transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        .wrapper {
            max-width: 860px; margin: 0 auto;
            padding: 3rem 2rem;
            position: relative; z-index: 1;
        }
        .page-title { margin-bottom: 2rem; }
        .page-title .eyebrow {
            font-size: 0.72rem; font-weight: 500;
            color: var(--text3); text-transform: uppercase;
            letter-spacing: 0.1em; margin-bottom: 8px;
        }
        .page-title h1 {
            font-family: 'Syne', sans-serif; font-size: 1.8rem;
            font-weight: 800; letter-spacing: -0.04em;
            display: flex; align-items: center; gap: 12px;
        }
        .title-icon {
            width: 42px; height: 42px; border-radius: 11px;
            background: rgba(16,185,129,0.12);
            color: var(--accent2);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }
        .form-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
        }
        .form-section {
            padding: 28px 32px;
            border-bottom: 1px solid var(--border);
        }
        .form-section:last-child { border-bottom: none; }
        .section-label {
            font-size: 0.72rem; font-weight: 500;
            color: var(--text3); text-transform: uppercase;
            letter-spacing: 0.09em; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: var(--border);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

        .field label {
            display: block;
            font-size: 0.8rem; font-weight: 500;
            color: var(--text2); margin-bottom: 7px;
        }
        .field input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border-bright);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem; color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input::placeholder { color: var(--text3); }
        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .field-hint {
            font-size: 0.75rem; color: var(--text3); margin-top: 5px;
        }
        .optional-tag {
            font-size: 0.68rem; color: var(--text3);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-bright);
            border-radius: 4px; padding: 1px 6px;
            margin-left: 6px; vertical-align: middle;
        }
        .input-unit-wrap { position: relative; }
        .input-unit-wrap input { padding-right: 44px; }
        .input-unit {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 0.78rem; color: var(--text3);
            font-weight: 500; pointer-events: none;
        }
        .form-actions {
            padding: 24px 32px;
            display: flex; gap: 12px; align-items: center;
        }
        .btn-submit {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 28px;
            background: var(--accent); color: #fff;
            font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem;
            border: none; border-radius: 11px; cursor: pointer;
            box-shadow: 0 0 24px var(--accent-glow);
            transition: all 0.2s; text-decoration: none;
        }
        .btn-submit:hover {
            background: #059669;
            box-shadow: 0 0 32px rgba(16,185,129,0.28);
            transform: translateY(-1px);
        }
        .btn-cancel {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 22px;
            background: rgba(255,255,255,0.04); color: var(--text2);
            font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 0.9rem;
            border: 1px solid var(--border-bright); border-radius: 11px;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.08); color: var(--text); }

        @media (max-width: 600px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .form-section { padding: 22px 20px; }
            .form-actions { padding: 20px; flex-direction: column; }
            .btn-submit, .btn-cancel { width: 100%; justify-content: center; }
            .wrapper { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="/" class="logo">
            <div class="logo-icon"><i class="fas fa-microchip"></i></div>
            TechStore
        </a>
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left" style="font-size:12px"></i> Bosh sahifaga
        </a>
    </div>
</nav>

<div class="wrapper">
    <div class="page-title">
        <div class="eyebrow">Ombor boshqaruvi</div>
        <h1>
            <div class="title-icon"><i class="fas fa-laptop"></i></div>
            Yangi Noutbuk Qo'shish
        </h1>
    </div>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-section">
                <div class="section-label">Asosiy ma'lumotlar</div>
                <div class="grid-2">
                    <div class="field">
                        <label>Brend</label>
                        <input type="text" name="brand" placeholder="Apple, ASUS, Lenovo..." required>
                    </div>
                    <div class="field">
                        <label>Model</label>
                        <input type="text" name="model" placeholder="MacBook Pro, ZenBook..." required>
                    </div>
                    <div class="field">
                        <label>Ishlab chiqarilgan yili</label>
                        <input type="number" name="year" value="2024" required>
                    </div>
                    <div class="field">
                        <label>Narxi</label>
                        <div class="input-unit-wrap">
                            <input type="number" name="price" placeholder="0" required>
                            <span class="input-unit">USD</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-label">Texnik xususiyatlar</div>
                <div class="field" style="margin-bottom:16px">
                    <label>Protsessor (CPU)</label>
                    <input type="text" name="cpu" placeholder="Apple M2, Intel Core i7, AMD Ryzen 7..." required>
                    <div class="field-hint">Chip modeli va avlodini kiriting</div>
                </div>
                <div class="grid-3">
                    <div class="field">
                        <label>Videokarta <span class="optional-tag">ixtiyoriy</span></label>
                        <input type="text" name="videocard" placeholder="Integral / RTX 3050">
                    </div>
                    <div class="field">
                        <label>RAM</label>
                        <div class="input-unit-wrap">
                            <input type="number" name="ram" placeholder="16" required>
                            <span class="input-unit">GB</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>Disk xotira</label>
                        <div class="input-unit-wrap">
                            <input type="number" name="disk" placeholder="512" required>
                            <span class="input-unit">GB</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-save" style="font-size:13px"></i> Bazaga saqlash
                </button>
                <a href="/" class="btn-cancel">
                    <i class="fas fa-times" style="font-size:13px"></i> Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
