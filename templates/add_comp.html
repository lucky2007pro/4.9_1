<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Yangi Kompyuter Qo'shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3 class="m-0"><i class="fas fa-desktop me-2"></i>Kompyuter Ma'lumotlarini Kiriting</h3>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Brend</label>
                                    <input type="text" name="brand" class="form-control" placeholder="Masalan: HP, Dell" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Model</label>
                                    <input type="text" name="model" class="form-control" placeholder="Masalan: Pavilion, OptiPlex" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Ishlab chiqarilgan yili</label>
                                    <input type="number" name="year" class="form-control" value="2024" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Narxi ($)</label>
                                    <input type="number" name="price" class="form-control" placeholder="0.00" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Protsessor (CPU)</label>
                                    <input type="text" name="cpu" class="form-control" placeholder="Core i5-12400" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Videokarta</label>
                                    <input type="text" name="videocard" class="form-control" placeholder="RTX 3060 12GB" required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Operativ xotira (RAM GB)</label>
                                    <input type="number" name="ram" class="form-control" placeholder="16" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Xotira (Disk GB/TB)</label>
                                    <input type="number" name="disk" class="form-control" placeholder="512" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Monitor</label>
                                    <input type="text" name="monitor" class="form-control" placeholder="24' Curved" required>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                                    <i class="fas fa-save me-2"></i>Bazaga saqlash
                                </button>
                                <a href="/" class="btn btn-outline-secondary w-100 mt-2">Bekor qilish</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
